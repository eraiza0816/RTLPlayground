name: Build and Release firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        machine: [SWGT024_V2_0_MANAGED, PCB_K0402WS_V3]
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          apt update
          apt install make gcc sdcc xxd python-is-python3 libjson-c-dev git -y

      - name: Check if machine.c can be compiled for all machines
        run: make machine_check

      - name: Build firmware
        run: make MACHINE="${{ matrix.machine }}"

      - name: Build CLI firmware (no web)
        run: |
          make MACHINE="${{ matrix.machine }}" clean
          make WEB=0 MACHINE="${{ matrix.machine }}"
          cd output/${{ matrix.machine }}
          for f in rtlplayground-v*.bin; do
            mv "$f" "rtlplayground-CLI-${f#rtlplayground-}"
          done

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.machine }}
          path: output/${{ matrix.machine }}/*.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true

      - name: Extract version
        run: echo "FW_VERSION=v$(grep '^VERSION=' Makefile | cut -d= -f2)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.FW_VERSION }}
          name: Firmware ${{ env.FW_VERSION }}
          body: |
            Automated firmware build for ${{ env.FW_VERSION }}.

            Includes builds for:
            - SWGT024_V2_0_MANAGED
            - PCB_K0402WS_V3
          files: "*.bin"
          make_latest: true
