<!DOCTYPE html>
<html>
  <title>RTL Switch Login</title>
  <style>
.login_page { margin: 0; padding: 0; background: #aaf; height: 100vh; overflow: hidden; }
.center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); width: 500px; height: 400px; background: white; border-radius: 2px; }
.center h1 { text-align: center; border-bottom: 1px solid silver; }
.center form { padding: 0 60px; box-sizing: border-box; }
form .txt_field { position: relative; border-bottom: 2px solid #adadad; margin: 30px 0; }
.txt_field input { width: 100%; padding: 0 5px; height: 40px; font-size: 16px; border: none; background: none; outline: none; }
.txt_field label { position: absolute; top: 50%; left: 5px; color: #adadad; transform: translateY(-50%); font-size: 16px; pointer-events: none; transition: .5s; }
.txt_field span::before { content: ''; position: absolute; top: 40px; left: 0; width: 100%; height: 2px; background: #aaf; }
.txt_field input:focus ~ label, .txt_field input:valid ~ label { top: -5px; color: #aaf; }
input[type=submit] { padding: 8px 16px; background-color: #aaf; color: #000; margin-bottom: 2em; border-radius: 15px; width: 100%; }
input[type=submit]:hover { background-color: #226; color: white; }
  </style>
  <script>
    function removeNote() {
      document.getElementById("incorrect").innerHTML = "";
    }
    window.addEventListener("load", function() {
      if (document.referrer.endsWith("login.html"))
      document.getElementById("incorrect").innerHTML = "Wrong password!";
    });
    </script>
</head>

<body class="login_page">
  <div class = "center">
  <h1> RTL Switch Login</h1>
  <form method="post" action="login">
  <div class="txt_field">
    <input name="pwd" type="password" onclick="removeNote()" required />
    <span></span>
    <label>Password</label>
  </div>
  <input type="submit" value="Login"/>
  <h3 id="incorrect" style="margin-top: 5em;"></h3>
  </form>
</body>
</html>
